name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check formatting
        run: python -m black --check bot.py

      - name: Check imports
        run: python -m isort --check-only bot.py

      - name: Lint
        run: python -m flake8 bot.py

      - name: Compile
        run: python -m py_compile bot.py

      - name: Audit runtime dependencies
        run: python -m pip_audit --requirement requirements.txt

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: vk-to-telegram-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run --rm \
            --read-only \
            --tmpfs /tmp:size=16m,mode=1777 \
            --security-opt no-new-privileges:true \
            --mount type=volume,target=/app/data \
            --mount type=volume,target=/app/logs \
            --env TG_TOKEN=123456:test \
            --env CHANNEL_ID=-100123 \
            --env VK_TOKEN=test \
            --env GROUP_ID=-1 \
            --env LAST_POST_FILE=/app/data/last_post.json \
            --env LOG_FILE=/app/logs/bot.log \
            --entrypoint python \
            vk-to-telegram-bot:ci \
            -c "import os, bot; assert os.getuid() == 10001; bot.save_last_post(42); assert bot.load_last_post() == 42; assert bot.LOG_FILE.exists()"
